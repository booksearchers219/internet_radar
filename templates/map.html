{% extends "base.html" %}
{% block content %}

    <div class="max-w-7xl mx-auto p-6">

        <!-- Navigation Bar -->
        <div class="flex items-center justify-between mb-8">
            <!-- Title - NOT clickable -->
            <h1 class="text-3xl font-bold text-white flex items-center gap-3">
                🌍 Global Threat Map
            </h1>


            <!-- Back Button - Red to match theme -->
            <a href="/"
               class="flex items-center gap-2 px-6 py-3 bg-red-600 hover:bg-red-700 text-white rounded-2xl transition-all hover:scale-105 font-medium">
                ← Back to Dashboard
            </a>
        </div>

        <!-- Map Container -->
        <div id="map" class="w-full h-[calc(100vh-180px)] rounded-2xl border border-gray-700 bg-gray-950"></div>

        <!-- Live Ticker -->
        <div id="ticker"
             class="mt-4 bg-gray-900 border border-gray-700 rounded-xl px-6 py-3 text-sm text-gray-300 overflow-hidden whitespace-nowrap">
            <span>Loading live threats...</span>
        </div>

    </div>

    <script>
        function initMap() {
            var map = L.map('map', {scrollWheelZoom: false}).setView([20, 0], 2);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 18,
                attribution: '&copy; OpenStreetMap contributors'
            }).addTo(map);

            console.log("✅ Map initialized");

            function loadAlerts() {
                fetch("/alerts")
                    .then(r => r.json())
                    .then(data => {
                        console.log(`📡 Loaded ${data.alerts.length} alerts`);

                        // Clear previous markers (keep only the base tile layer)
                        map.eachLayer(layer => {
                            if (layer instanceof L.Marker) {
                                map.removeLayer(layer);
                            }
                        });

                        let added = 0;

                        data.alerts.forEach((alert, i) => {
                            let lat = parseFloat(alert.lat);
                            let lon = parseFloat(alert.lon);

                            if (!lat || !lon || isNaN(lat) || isNaN(lon)) {
                                return;
                            }

                            added++;

                            let color = "#eab308"; // yellow
                            if (alert.severity >= 5) color = "#ef4444";     // red
                            else if (alert.severity >= 3) color = "#f97316"; // orange

                            var icon = L.divIcon({
                                html: `<div style="background-color:${color}; width:18px; height:18px; border-radius:50%; border:3px solid white; box-shadow:0 0 6px rgba(0,0,0,0.5);"></div>`,
                                iconSize: [18, 18],
                                className: ''
                            });

                            L.marker([lat, lon], {icon: icon})
                                .addTo(map)
                                .bindPopup(`
                            <b>${alert.title}</b><br>
                            Source: ${alert.source}<br>
                            Score: ${alert.score || alert.severity}<br>
                            ${alert.learning ? alert.learning : ''}
                        `);
                        });

                        console.log(`✅ Added ${added} markers`);

                        // Update ticker
                        var titles = data.alerts.slice(0, 12).map(a => "⚠ " + a.title);
                        document.getElementById("ticker").innerHTML =
                            `<span>${titles.join("  •  ")}</span>`;
                    })
                    .catch(err => {
                        console.error("Fetch error:", err);
                        document.getElementById("ticker").innerHTML =
                            `<span style="color:#f87171;">Error loading alerts</span>`;
                    });
            }

            loadAlerts();
            setInterval(loadAlerts, 60000); // Refresh every 60 seconds
        }

        window.addEventListener('load', initMap);
    </script>

    <style>
        #ticker span {
            display: inline-block;
            padding-left: 100%;
            animation: ticker-scroll 90s linear infinite;
        }

        @keyframes ticker-scroll {
            0% {
                transform: translateX(0);
            }
            100% {
                transform: translateX(-100%);
            }
        }

        #ticker:hover span {
            animation-play-state: paused;
        }
    </style>

{% endblock %}
