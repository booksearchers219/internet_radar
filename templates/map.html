{% extends "base.html" %}
{% block content %}
<div class="max-w-7xl mx-auto p-6">
    <h1 class="text-3xl font-bold mb-6 flex items-center gap-3">
        🌍 Global Threat Radar Map
        <span class="text-sm bg-red-900 px-3 py-1 rounded-full text-red-300">Live • Updated every 60s</span>
    </h1>
    
    <div id="ticker" class="bg-black text-lime-400 p-3 font-mono text-sm mb-6 overflow-hidden whitespace-nowrap rounded-xl"></div>

    <!-- Explicit height and flex to ensure map has space -->
    <div class="h-[700px] rounded-2xl border border-red-900 shadow-2xl overflow-hidden">
        <div id="map" style="height: 100%; width: 100%;"></div>
    </div>
</div>

<script>
    // Initialize map AFTER everything is rendered
    function initMap() {
        var map = L.map('map', { scrollWheelZoom: false }).setView([20, 0], 2);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 18,
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        var cveLayer = L.markerClusterGroup();
        var githubLayer = L.markerClusterGroup();
        var newsLayer = L.markerClusterGroup();
        var heatLayer = L.heatLayer([], { radius: 25, blur: 15, maxZoom: 10 });

        map.addLayer(cveLayer);
        map.addLayer(githubLayer);
        map.addLayer(newsLayer);
        map.addLayer(heatLayer);

        function loadAlerts() {
            fetch("/alerts")
                .then(r => r.json())
                .then(data => {
                    cveLayer.clearLayers();
                    githubLayer.clearLayers();
                    newsLayer.clearLayers();
                    heatLayer.setLatLngs([]);

                    let hasMarkers = false;

                    data.alerts.forEach(alert => {
                        let lat = alert.lat;
                        let lon = alert.lon;
                        if (!lat || !lon || isNaN(lat) || isNaN(lon)) return;

                        hasMarkers = true;

                        // Color-coded dot
                        let color = "#eab308";
                        if (alert.severity >= 5) color = "#ef4444";
                        else if (alert.severity >= 3) color = "#f97316";

                        var icon = L.divIcon({
                            html: `<div style="background-color:${color}; width:16px; height:16px; border-radius:50%; border:3px solid white;"></div>`,
                            iconSize: [16, 16],
                            className: ''
                        });

                        var marker = L.marker([lat, lon], { icon: icon })
                            .bindPopup(`
                                <b>${alert.title}</b><br>
                                Source: ${alert.source}<br>
                                Score: ${alert.score || alert.severity}
                                ${alert.learning ? '<br>' + alert.learning : ''}
                            `);

                        if (alert.type === "vulnerability") cveLayer.addLayer(marker);
                        else if (alert.type === "repository") githubLayer.addLayer(marker);
                        else newsLayer.addLayer(marker);

                        heatLayer.addLatLng([lat, lon, (alert.severity || 2) * 8]);
                    });

                    // Live ticker
                    var titles = data.alerts.slice(0, 12).map(a => "⚠ " + a.title);
                    document.getElementById("ticker").innerHTML = `<span>${titles.join("  •  ")}</span>`;

                    // Force redraw if needed
                    if (hasMarkers) map.invalidateSize();
                })
                .catch(err => console.error("Map load error:", err));
        }

        loadAlerts();
        setInterval(loadAlerts, 60000);

        L.control.layers(null, {
            "CVE Vulnerabilities": cveLayer,
            "GitHub": githubLayer,
            "News": newsLayer,
            "Heatmap": heatLayer
        }).addTo(map);

        // Extra safety: redraw after a short delay
        setTimeout(() => map.invalidateSize(), 500);
    }

    // Run when page is fully loaded
    window.addEventListener('load', initMap);
</script>

<style>
    #ticker span {
        display: inline-block;
        padding-left: 100%;
        animation: ticker-scroll 90s linear infinite;
    }
    @keyframes ticker-scroll {
        0% { transform: translateX(0); }
        100% { transform: translateX(-100%); }
    }
    #ticker:hover span { animation-play-state: paused; }
</style>
{% endblock %}
