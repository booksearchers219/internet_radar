{% extends "base.html" %}
{% block content %}
<div class="max-w-7xl mx-auto p-6">
    <h1 class="text-3xl font-bold mb-6 flex items-center gap-3">
        🌍 Global Threat Radar Map
        <span class="text-sm bg-red-900 px-3 py-1 rounded-full text-red-300">Live • Updated every 60s</span>
    </h1>
    
    <div id="ticker" class="bg-black text-lime-400 p-3 font-mono text-sm mb-6 overflow-hidden whitespace-nowrap rounded-xl"></div>

    <div class="h-[700px] rounded-2xl border border-red-900 shadow-2xl overflow-hidden">
        <div id="map" style="height: 100%; width: 100%;"></div>
    </div>
</div>

<script>
    function initMap() {
        var map = L.map('map', { scrollWheelZoom: false }).setView([20, 0], 2);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 18,
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        console.log("✅ Map initialized");

        function loadAlerts() {
            fetch("/alerts")
                .then(r => r.json())
                .then(data => {
                    console.log(`📡 Loaded ${data.alerts.length} alerts`);

                    // Clear previous markers
                    map.eachLayer(layer => {
                        if (layer instanceof L.Marker) map.removeLayer(layer);
                    });

                    let added = 0;

                    data.alerts.forEach((alert, i) => {
                        let lat = parseFloat(alert.lat);
                        let lon = parseFloat(alert.lon);

                        if (!lat || !lon || isNaN(lat) || isNaN(lon)) {
                            console.log(`Alert ${i} skipped: no valid lat/lon`);
                            return;
                        }

                        added++;

                        let color = "#eab308"; // yellow
                        if (alert.severity >= 5) color = "#ef4444";      // red
                        else if (alert.severity >= 3) color = "#f97316"; // orange

                        var icon = L.divIcon({
                            html: `<div style="background-color:${color};width:18px;height:18px;border-radius:50%;border:3px solid white;box-shadow:0 0 6px rgba(0,0,0,0.5);"></div>`,
                            iconSize: [18, 18],
                            className: ''
                        });

                        L.marker([lat, lon], { icon: icon })
                            .addTo(map)
                            .bindPopup(`
                                <b>${alert.title}</b><br>
                                Source: ${alert.source}<br>
                                Score: ${alert.score || alert.severity}<br>
                                ${alert.learning ? alert.learning : ''}
                            `);

                        console.log(`Added marker at [${lat.toFixed(2)}, ${lon.toFixed(2)}]`);
                    });

                    console.log(`✅ Added ${added} markers`);

                    // Ticker
                    var titles = data.alerts.slice(0, 12).map(a => "⚠ " + a.title);
                    document.getElementById("ticker").innerHTML = `<span>${titles.join("  •  ")}</span>`;
                })
                .catch(err => console.error("Fetch error:", err));
        }

        loadAlerts();
        setInterval(loadAlerts, 60000);
    }

    window.addEventListener('load', initMap);
</script>

<style>
    #ticker span {
        display: inline-block;
        padding-left: 100%;
        animation: ticker-scroll 90s linear infinite;
    }
    @keyframes ticker-scroll {
        0% { transform: translateX(0); }
        100% { transform: translateX(-100%); }
    }
    #ticker:hover span { animation-play-state: paused; }
</style>
{% endblock %}
