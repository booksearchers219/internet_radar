<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internet Radar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: 500px; }
        .threat-card { transition: all 0.3s; }
        .threat-card:hover { transform: translateY(-4px); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body class="bg-gray-950 text-gray-100">
    <div class="min-h-screen">
        <!-- Navbar -->
        <nav class="bg-black border-b border-red-900 p-4">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <h1 class="text-3xl font-bold text-red-500">🌐 INTERNET RADAR</h1>
                <div id="last-update" class="text-sm text-gray-400"></div>
            </div>
        </nav>

        {% block content %}{% endblock %}
    </div>

    <script>
        // Auto-refresh every 30 seconds (adjust as needed)
        setInterval(() => location.reload(), 30000);
    </script>
</body>
</html>
